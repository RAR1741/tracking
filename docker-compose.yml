version: "3"

volumes:
  postgres_data:
    driver: local

services:
  postgres:
    image: postgres:12
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: "none"
    ports:
      - "5432:5432"

  server:
    build:
      context: .
    tty: true
    stdin_open: true
    env_file:
      - ./.env
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    links:
      - postgres
    volumes:
      - ./:/app:delegated
